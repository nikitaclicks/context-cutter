name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: context-cutter-mcp-x86_64-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: context-cutter-mcp-aarch64-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: context-cutter-mcp-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: context-cutter-mcp-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: context-cutter-mcp-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cross linker for aarch64 linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build MCP binary
        run: cargo build --release --bin context-cutter-mcp --target ${{ matrix.target }}

      - name: Package artifact (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/context-cutter-mcp ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Package artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/context-cutter-mcp.exe" "${{ matrix.artifact }}"
          $hash = (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii "${{ matrix.artifact }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -maxdepth 3 -type f -exec cp {} release/ \;
          cat release/*.sha256 > release/checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*

  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  publish-pypi:
    name: Publish PyPI via Maturin
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: --release --features python --out dist

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/nikitaclicks/context-cutter-mcp:${{ github.ref_name }}
            ghcr.io/nikitaclicks/context-cutter-mcp:latest

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: [build-binaries]
    defaults:
      run:
        working-directory: npm/context-cutter-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
