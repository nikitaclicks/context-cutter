name: Tests

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python tooling
        run: python -m pip install ruff

      - name: Rust fmt
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy -- -D warnings

      - name: Ruff
        run: ruff check python/ tests/ --exit-zero

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install project (dev)
        run: python -m pip install -e ".[dev]"

      - name: Run Rust tests
        run: cargo test

      - name: Run Python tests
        run: pytest -m "not ai_e2e_offline and not ai_e2e_live"

  coverage:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Install project + coverage deps
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pytest-cov

      - name: Rust coverage
        run: cargo llvm-cov --workspace --lcov --output-path rust.lcov

      - name: Python coverage
        run: pytest --cov=python/context_cutter --cov-report=xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./rust.lcov,./coverage.xml
          fail_ci_if_error: false
